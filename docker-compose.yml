version: '3.8'

services:
  wool-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: wool-server
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./server/uploads:/app/uploads
      - ./server/logs:/app/logs
    networks:
      - wool-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  wool-client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: wool-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - wool-server
    networks:
      - wool-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: wool-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - wool-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
    driver: local

networks:
  wool-network:
    driver: bridge
